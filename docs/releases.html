    .releases-hero p {

      font-size: 18px;
      margin: 0;
    }
    .releases-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 60px 24px;
    }
    .release-card {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 40px;
      margin-bottom: 40px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.02);
      transition: transform 200ms ease, box-shadow 200ms ease;
    }
    .release-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.04);
    }
    .release-loading {
      text-align: center;
      color: var(--muted);
      padding: 40px 0;
      font-size: 14px;
    }

    /* Markdown Style Overrides inside card */
    .release-content h1 {
      font-size: 28px;
      margin-bottom: 16px;
      border-bottom: 2px solid var(--line);
      padding-bottom: 8px;
    }
    .release-content h2 {
      font-size: 20px;
      margin-top: 24px;
      margin-bottom: 12px;
      border-bottom: 1px solid var(--line);
      padding-bottom: 6px;
    }
    .release-content h3 {
      font-size: 16px;
      margin-top: 20px;
      margin-bottom: 8px;
    }
    .release-content p {
      font-size: 15px;
      line-height: 1.7;
      color: var(--ink);
      margin-bottom: 16px;
    }
    .release-content ul {
      margin-bottom: 20px;
      padding-left: 20px;
    }
    .release-content li {
      font-size: 14px;
      line-height: 1.7;
      margin-bottom: 8px;
      color: var(--ink);
    }
    .release-content code {
      font-family: monospace;
      background: var(--surface);
      padding: 2px 6px;
      border-radius: 4px;
      font-size: 0.9em;
    }

    .back-btn-container {
      margin-bottom: 40px;
    }
    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
      color: var(--accent);
      transition: color 160ms ease;
    }
    .back-btn:hover {
      color: var(--accent-hover);
    }
  </style>

        <button type="button" lang="en" data-language="en">English</button>
        <button type="button" lang="zh-CN" data-language="zh-CN">中文</button>
        <button type="button" lang="ko" data-language="ko">한국어</button>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // 存在するリリースのバージョンリスト
      const versions = [
        'v1.2.5', 'v1.2.4', 'v1.2.3', 'v1.2.2', 'v1.2.1', 'v1.2.0', 'v1.1.9', 'v1.1.8', 'v1.1.7', 'v1.1.6',
        'v1.1.5', 'v1.1.4', 'v1.1.3', 'v1.1.2', 'v1.1.1',
        'v1.1.0', 'v1.0.1', 'v1.0.0'
      ];

      const listContainer = document.getElementById('releases-list');

      // カスタム言語変更イベントを監視する
      window.addEventListener('languagechange', (e) => {
        console.log('Language changed to:', e.detail);
        loadReleases(e.detail);
      });

      function parseMarkdownToHTML(markdown) {
        if (typeof marked !== 'undefined') {
          if (typeof marked.parse === 'function') {
            return marked.parse(markdown);
          } else if (typeof marked === 'function') {
            return marked(markdown);
          }
        }
        // 万が一 marked が読み込めていない場合の超簡易パーサー（フォールバック）
        return markdown
          .replace(/^# (.*$)/gim, '<h1>$1</h1>')
          .replace(/^## (.*$)/gim, '<h2>$1</h2>')
          .replace(/^### (.*$)/gim, '<h3>$1</h3>')
          .replace(/^\- (.*$)/gim, '<li>$1</li>')
          .replace(/\`([^\`]+)\`/g, '<code>$1</code>')
          .replace(/\n$/gim, '<br>');
      }

      function extractLanguageSection(markdown, lang) {
        const langHeadings = {
          'en': 'English',
          'ja': '日本語',
          'zh-CN': '中文',
          'ko': '한국어'
        };

        const targetHeading = langHeadings[lang] || 'English';
        const lines = markdown.split(/\r?\n/);
        const resultLines = [];

        // 最初に見つかったタイトルの行（# ）を探す
        let titleLine = '';
        for (const line of lines) {
          if (line.startsWith('# ')) {
            titleLine = line;
            break;
          }
        }
        if (titleLine) {
          resultLines.push(titleLine);
        }

        let inTargetSection = false;

        for (let i = 0; i < lines.length; i++) {
          const line = lines[i];

          if (line.startsWith('## ')) {
            const headingText = line.substring(3).trim();
            if (headingText === targetHeading) {
              inTargetSection = true;
            } else {
              inTargetSection = false;
            }
            continue;
          }

          if (inTargetSection) {
            // 見出しの階層を1つ上げる（### -> ##, #### -> ###）
            if (line.startsWith('### ')) {
              resultLines.push('## ' + line.substring(4));
            } else if (line.startsWith('#### ')) {
              resultLines.push('### ' + line.substring(5));
            } else {
              resultLines.push(line);
            }
          }
        }

        // ターゲットセクションが空（未翻訳など）の場合は English セクションで再試行
        if (resultLines.length <= 1) {
          if (targetHeading !== 'English') {
            console.warn(`Section for "${targetHeading}" not found, falling back to English.`);
            return extractLanguageSection(markdown, 'en');
          }
          return markdown; // それでもなければ全体をそのまま返す
        }

        return resultLines.join('\n');
      }

      async function loadReleases(lang) {
        const selectedLang = lang || document.documentElement.lang || 'ja';
        console.log('Loading releases for language:', selectedLang);

        listContainer.innerHTML = '<div class="release-loading">Loading releases...</div>';

        const fetchPromises = versions.map(async (version) => {
          const url = `releases/${version}.md`;

          try {
            const response = await fetch(url);
            if (!response.ok) throw new Error(`Failed to load ${version}`);
            const markdown = await response.text();

            // 選択された言語のセクションだけを抽出してパースする
            const langMarkdown = extractLanguageSection(markdown, selectedLang);
            const htmlContent = parseMarkdownToHTML(langMarkdown);

            return {
              version,
              html: htmlContent,
              success: true
            };
          } catch (error) {
            console.error(`Error loading release ${version}:`, error);
            return {
              version,
              html: `<h2>Token Meter ${version.replace('v', '')}</h2><p>Failed to load release notes.</p>`,
              success: false
            };
          }
        });

        const results = await Promise.all(fetchPromises);

        listContainer.innerHTML = '';
        results.forEach(result => {
          const card = document.createElement('article');
          card.className = 'release-card';

          const contentDiv = document.createElement('div');
          contentDiv.className = 'release-content';
          contentDiv.innerHTML = result.html;

          card.appendChild(contentDiv);
          listContainer.appendChild(card);
        });
      }

      // 初回ロード
      loadReleases(document.documentElement.lang);
    });
  </script>
</body>
